<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'">
  <link rel="stylesheet" href="control-plane.css">
  <title>Control Plane</title>
</head>
<body>
  <div class="panel">
    <div class="panel-header">
      <div class="panel-brand">Control</div>
      <button class="close-btn" id="close-btn" title="Hide">&times;</button>
    </div>

    <div class="panel-body">
      <div class="connect-section">
        <div class="connect-header">
          <div class="connect-label">Connection</div>
          <div class="tunnel-row">
            <span id="tunnel-status" class="pill pill-stopped">local</span>
            <button id="tunnel-action-btn" class="tunnel-btn" type="button">Start tunnel</button>
          </div>
        </div>

        <div id="connect-url-block" class="connect-url-block">
          <div class="label">Base URL</div>
          <div class="value" id="connect-url">http://127.0.0.1:3000</div>
        </div>

        <div class="key-toggle" id="key-toggle">
          <span class="key-toggle-label">API Key</span>
          <span class="key-toggle-chevron">&#9660;</span>
        </div>
        <div class="key-value" id="key-value"></div>

        <div class="copy-row">
          <button class="copy-action" id="copy-creds-btn" type="button">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
            API Credentials
          </button>
          <button class="copy-action" id="copy-docs-btn" type="button">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            API Docs
          </button>
        </div>
        <div class="copy-row">
          <button class="copy-action" id="copy-mcp-btn" type="button">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
            MCP Config
          </button>
        </div>
      </div>

      <div class="section-divider"></div>

      <div class="section-label">Activity</div>
      <div id="activity-list" class="activity-feed"></div>
    </div>
  </div>

  <script src="control-plane-renderer.js"></script>
</body>
</html>
