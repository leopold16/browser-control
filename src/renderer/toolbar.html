<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:">
  <link rel="stylesheet" href="toolbar.css">
  <title>Toolbar</title>
</head>
<body>
  <div class="toolbar-shell">
    <div class="window-drag"></div>

    <button class="icon-btn sidebar-toggle-btn" id="sidebar-toggle-btn" title="Toggle sidebar">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="2" width="4" height="12" rx="1" fill="currentColor" opacity=".55"/><rect x="6" y="2" width="9" height="12" rx="1" stroke="currentColor" stroke-width="1.4" fill="none"/></svg>
    </button>

    <div class="nav-group">
      <button class="icon-btn" id="back-btn" title="Back">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button class="icon-btn" id="forward-btn" title="Forward">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <button class="icon-btn" id="refresh-btn" title="Refresh">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      </button>
    </div>

    <div class="address-shell">
      <svg class="address-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="7"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input id="url-bar" class="url-bar" type="text" placeholder="Search Google or enter URL" spellcheck="false" autocomplete="off">
    </div>

    <div class="toolbar-right-group">
      <div class="page-context">
        <div class="page-title" id="page-title">New page</div>
        <div class="page-meta" id="page-meta">Ready</div>
      </div>

      <button class="icon-btn panel-toggle-btn" id="control-plane-btn" title="Toggle control plane">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="11" y="2" width="4" height="12" rx="1" fill="currentColor" opacity=".55"/><rect x="1" y="2" width="9" height="12" rx="1" stroke="currentColor" stroke-width="1.4" fill="none"/></svg>
      </button>
    </div>
  </div>

  <script src="toolbar-renderer.js"></script>
</body>
</html>
